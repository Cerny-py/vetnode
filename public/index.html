<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetnode</title>
    <link href="/css/estilos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <div class="container mt-5">
        <h1 class="mb-4">Gestión de Consultas</h1>

        <div class="card mb-4">
            <div class="card-header">
                <strong id="titulo-formulario">Agregar Consulta</strong>
            </div>
            <div class="card-body">

                <input type="hidden" id="consulta-id">

                <div class="row g-3">
                    <div class="col-md-3">
                        <input type="text" id="input-nombre" class="form-control" placeholder="Nombre mascota">
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="input-fecha" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="input-motivo" class="form-control" placeholder="Motivo">
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button id="btn-guardar" class="btn btn-primary w-100">Guardar</button>
                        <button id="btn-cancelar" class="btn btn-secondary w-100">Cancelar</button>
                    </div>
                </div>

            </div>
        </div>

        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Mascota</th>
                    <th>Fecha</th>
                    <th>Motivo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <template id="plantilla-fila">
        <tr>
            <td class="col-id"></td>
            <td class="col-nombre"></td>
            <td class="col-fecha"></td>
            <td class="col-motivo"></td>
            <td>
                <button class="btn btn-warning btn-sm me-1 btn-editar">Editar</button>
                <button class="btn btn-danger btn-sm btn-eliminar">Eliminar</button>
            </td>
        </tr>
    </template>

    <script src="/js/consultas.js"></script>
</body>

</html>
